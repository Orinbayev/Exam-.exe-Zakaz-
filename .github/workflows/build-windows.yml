name: Windows Bundle yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python 3.11 embedded yuklab olish
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "python-embed.zip"
          Expand-Archive "python-embed.zip" -DestinationPath "python-embed"

      - name: Embedded Python ga pip va site-packages yoqish
        run: |
          (Get-Content "python-embed\python311._pth") -replace '#import site', 'import site' | Set-Content "python-embed\python311._pth"
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          .\python-embed\python.exe get-pip.py --no-warn-script-location -q

      - name: Kutubxonalar o'rnatish
        run: |
          .\python-embed\python.exe -m pip install `
            PyQt6==6.6.0 `
            PyQt6-Charts==6.6.0 `
            requests==2.31.0 `
            matplotlib==3.8.0 `
            openpyxl==3.1.2 `
            --no-warn-script-location -q

      - name: O'quvchi bundle yasash
        run: |
          New-Item -ItemType Directory -Path "OquvchiPanel\python" -Force
          New-Item -ItemType Directory -Path "OquvchiPanel\app" -Force
          Copy-Item -Recurse "python-embed\*" "OquvchiPanel\python\"
          Copy-Item -Recurse "client\app\*" "OquvchiPanel\app\"
          Copy-Item "client\run_student.py" "OquvchiPanel\run_student.py"
          Copy-Item "client\config.json" "OquvchiPanel\config.json"

          $bat = "@echo off`r`ncd /d ""%~dp0""`r`nset PYTHONPATH=%~dp0`r`nstart `"`" python\python.exe run_student.py`r`n"
          Set-Content -Path "OquvchiPanel\OquvchiPanel.bat" -Value $bat -Encoding ASCII

          Compress-Archive -Path "OquvchiPanel" -DestinationPath "OquvchiPanel-Windows.zip" -Force

      - name: O'qituvchi bundle yasash
        run: |
          New-Item -ItemType Directory -Path "OqituvchiPanel\python" -Force
          New-Item -ItemType Directory -Path "OqituvchiPanel\app" -Force
          Copy-Item -Recurse "python-embed\*" "OqituvchiPanel\python\"
          Copy-Item -Recurse "client\app\*" "OqituvchiPanel\app\"
          Copy-Item "client\run_client.py" "OqituvchiPanel\run_client.py"
          Copy-Item "client\config.json" "OqituvchiPanel\config.json"

          $bat = "@echo off`r`ncd /d ""%~dp0""`r`nset PYTHONPATH=%~dp0`r`nstart `"`" python\python.exe run_client.py`r`n"
          Set-Content -Path "OqituvchiPanel\OqituvchiPanel.bat" -Value $bat -Encoding ASCII

          Compress-Archive -Path "OqituvchiPanel" -DestinationPath "OqituvchiPanel-Windows.zip" -Force

      - name: O'quvchi artifact yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OquvchiPanel-Windows
          path: OquvchiPanel-Windows.zip
          retention-days: 30

      - name: O'qituvchi artifact yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OqituvchiPanel-Windows
          path: OqituvchiPanel-Windows.zip
          retention-days: 30
