name: Windows Installer yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python 3.11 o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Kutubxonalarni o'rnatish
        working-directory: client
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller==6.3.0
          pip install PyQt6==6.6.1 PyQt6-Qt6==6.6.1 PyQt6-sip==13.6.0
          pip install -r requirements.txt

      - name: O'quvchi .exe yasash
        working-directory: client
        run: pyinstaller --clean --noconfirm student_win.spec

      - name: O'qituvchi .exe yasash
        working-directory: client
        run: pyinstaller --clean --noconfirm teacher_win.spec

      - name: Installer papkasi yaratish
        working-directory: client
        run: New-Item -ItemType Directory -Force -Path installer

      - name: O'quvchi installer yasash (Inno Setup)
        working-directory: client
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" student_setup.iss

      - name: O'qituvchi installer yasash (Inno Setup)
        working-directory: client
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" teacher_setup.iss

      - name: O'quvchi Setup.exe yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OquvchiPanel-Setup
          path: client/installer/OquvchiPanel-Setup.exe
          retention-days: 30

      - name: O'qituvchi Setup.exe yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OqituvchiPanel-Setup
          path: client/installer/OqituvchiPanel-Setup.exe
          retention-days: 30
