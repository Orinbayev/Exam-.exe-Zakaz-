name: Windows Installer yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python 3.11 embedded yuklab olish
        run: |
          Invoke-WebRequest "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" -OutFile "py.zip"
          Expand-Archive "py.zip" -DestinationPath "pyembed"

      - name: pip va site-packages yoqish
        run: |
          (Get-Content "pyembed\python311._pth") -replace '#import site','import site' | Set-Content "pyembed\python311._pth"
          Invoke-WebRequest "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          .\pyembed\python.exe get-pip.py -q --no-warn-script-location

      - name: Kutubxonalar o'rnatish
        run: |
          .\pyembed\python.exe -m pip install -q --no-warn-script-location PyQt6==6.6.0 PyQt6-Charts==6.6.0 requests==2.31.0 openpyxl==3.1.2

      - name: O'quvchi bundle yasash
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\OquvchiPanel\python" -Force | Out-Null
          New-Item -ItemType Directory -Path "dist\OquvchiPanel\app"    -Force | Out-Null
          Copy-Item -Recurse "pyembed\*"     "dist\OquvchiPanel\python\"
          Copy-Item -Recurse "client\app\*"  "dist\OquvchiPanel\app\"
          Copy-Item "client\run_student.py"  "dist\OquvchiPanel\run_student.py"
          Copy-Item "client\config.json"     "dist\OquvchiPanel\config.json"
          $lines = @(
            'Set sh = CreateObject("WScript.Shell")',
            'p = Left(WScript.ScriptFullName, InStrRev(WScript.ScriptFullName, "\"))',
            'sh.CurrentDirectory = p',
            'sh.Environment("Process")("PYTHONPATH") = p',
            'exe = Chr(34) & p & "python\pythonw.exe" & Chr(34)',
            'scr = Chr(34) & p & "run_student.py" & Chr(34)',
            'sh.Run exe & " " & scr, 0, False'
          )
          $lines | Set-Content "dist\OquvchiPanel\OquvchiPanel.vbs" -Encoding ASCII

      - name: O'qituvchi bundle yasash
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\OqituvchiPanel\python" -Force | Out-Null
          New-Item -ItemType Directory -Path "dist\OqituvchiPanel\app"    -Force | Out-Null
          Copy-Item -Recurse "pyembed\*"     "dist\OqituvchiPanel\python\"
          Copy-Item -Recurse "client\app\*"  "dist\OqituvchiPanel\app\"
          Copy-Item "client\run_client.py"   "dist\OqituvchiPanel\run_client.py"
          Copy-Item "client\config.json"     "dist\OqituvchiPanel\config.json"
          $lines = @(
            'Set sh = CreateObject("WScript.Shell")',
            'p = Left(WScript.ScriptFullName, InStrRev(WScript.ScriptFullName, "\"))',
            'sh.CurrentDirectory = p',
            'sh.Environment("Process")("PYTHONPATH") = p',
            'exe = Chr(34) & p & "python\pythonw.exe" & Chr(34)',
            'scr = Chr(34) & p & "run_client.py" & Chr(34)',
            'sh.Run exe & " " & scr, 0, False'
          )
          $lines | Set-Content "dist\OqituvchiPanel\OqituvchiPanel.vbs" -Encoding ASCII

      - name: O'quvchi Setup.exe yasash (Inno Setup)
        shell: pwsh
        run: |
          $src = (Resolve-Path "dist\OquvchiPanel").Path
          $out = (Resolve-Path ".").Path
          $lines = @(
            "[Setup]",
            "AppName=Smart Exam - Oquvchi Paneli",
            "AppVersion=1.0",
            "AppPublisher=Smart Exam System",
            "DefaultDirName={autopf}\SmartExam\OquvchiPanel",
            "DefaultGroupName=Smart Exam",
            "OutputDir=$out",
            "OutputBaseFilename=OquvchiPanel-Setup",
            "Compression=lzma2",
            "SolidCompression=yes",
            "WizardStyle=modern",
            "DisableProgramGroupPage=yes",
            "",
            "[Files]",
            "Source: `"$src\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs",
            "",
            "[Icons]",
            "Name: `"{commondesktop}\Oquvchi Paneli`"; Filename: `"{app}\OquvchiPanel.vbs`"",
            "Name: `"{group}\Oquvchi Paneli`";         Filename: `"{app}\OquvchiPanel.vbs`"",
            "",
            "[Run]",
            "Filename: `"{app}\OquvchiPanel.vbs`"; Description: `"Dasturni ishga tushirish`"; Flags: nowait postinstall skipifsilent shellexec"
          )
          $lines | Set-Content "student.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "student.iss"

      - name: O'qituvchi Setup.exe yasash (Inno Setup)
        shell: pwsh
        run: |
          $src = (Resolve-Path "dist\OqituvchiPanel").Path
          $out = (Resolve-Path ".").Path
          $lines = @(
            "[Setup]",
            "AppName=Smart Exam - Oqituvchi Paneli",
            "AppVersion=1.0",
            "AppPublisher=Smart Exam System",
            "DefaultDirName={autopf}\SmartExam\OqituvchiPanel",
            "DefaultGroupName=Smart Exam",
            "OutputDir=$out",
            "OutputBaseFilename=OqituvchiPanel-Setup",
            "Compression=lzma2",
            "SolidCompression=yes",
            "WizardStyle=modern",
            "DisableProgramGroupPage=yes",
            "",
            "[Files]",
            "Source: `"$src\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs",
            "",
            "[Icons]",
            "Name: `"{commondesktop}\Oqituvchi Paneli`"; Filename: `"{app}\OqituvchiPanel.vbs`"",
            "Name: `"{group}\Oqituvchi Paneli`";         Filename: `"{app}\OqituvchiPanel.vbs`"",
            "",
            "[Run]",
            "Filename: `"{app}\OqituvchiPanel.vbs`"; Description: `"Dasturni ishga tushirish`"; Flags: nowait postinstall skipifsilent shellexec"
          )
          $lines | Set-Content "teacher.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "teacher.iss"

      - name: O'quvchi Setup.exe yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OquvchiPanel-Setup
          path: OquvchiPanel-Setup.exe
          retention-days: 30

      - name: O'qituvchi Setup.exe yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OqituvchiPanel-Setup
          path: OqituvchiPanel-Setup.exe
          retention-days: 30
