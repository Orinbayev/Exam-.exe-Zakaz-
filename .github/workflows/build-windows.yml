name: Windows Installer yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python 3.11 o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      # -----------------------------------------------------------------------
      # PyQt6 6.4.2 — Windows 10/11 da eng barqaror versiya.
      # 6.6.x da Qt6Core.dll yangi Windows API funktsiyalarini ishlatadi,
      # bu esa eski yoki to'liq yangilanmagan Windows 10 da "procedure not found"
      # xatoligini keltirib chiqaradi.
      # -----------------------------------------------------------------------
      - name: Kutubxonalar o'rnatish
        working-directory: client
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller==6.11.1
          pip install PyQt6==6.4.2 "PyQt6-Qt6==6.4.2" "PyQt6-sip==13.4.0"
          pip install "PyQt6-Charts==6.4.2"
          pip install requests==2.31.0 openpyxl==3.1.2

      - name: O'quvchi .exe yasash
        working-directory: client
        shell: pwsh
        run: pyinstaller --clean --noconfirm student_win.spec

      - name: O'qituvchi .exe yasash
        working-directory: client
        shell: pwsh
        run: pyinstaller --clean --noconfirm teacher_win.spec

      # -----------------------------------------------------------------------
      # KRITIK TUZATISH 1: python3.dll ni bundle ichiga qo'shish.
      # PyQt6 pyd fayllar Python Stable ABI (python3.dll) ga bog'liq.
      # Target mashinada python3.dll bo'lmasa yoki boshqa versiyasi bo'lsa
      # "DLL load failed: The specified procedure could not be found" xatosi chiqadi.
      # -----------------------------------------------------------------------
      - name: python3.dll ni bundle ichiga ko'chirish
        shell: pwsh
        run: |
          $pythonExe = (python -c "import sys; print(sys.executable)")
          $pythonDir = Split-Path $pythonExe -Parent
          $py3dll    = Join-Path $pythonDir "python3.dll"

          if (-not (Test-Path $py3dll)) {
            Write-Host "python3.dll Python dir da topilmadi, System32 da qidirilmoqda..."
            $py3dll = Join-Path "$env:SystemRoot\System32" "python3.dll"
          }

          $targets = @(
            "client\dist\OquvchiPanel\_internal",
            "client\dist\OquvchiPanel",
            "client\dist\OqituvchiPanel\_internal",
            "client\dist\OqituvchiPanel"
          )

          if (Test-Path $py3dll) {
            foreach ($t in $targets) {
              if (Test-Path $t) {
                Copy-Item $py3dll -Destination $t -Force
                Write-Host "[OK] python3.dll -> $t"
              }
            }
          } else {
            Write-Host "[WARN] python3.dll topilmadi — PyInstaller o'zi qo'shgan bo'lishi mumkin"
          }

      # -----------------------------------------------------------------------
      # KRITIK TUZATISH 2: MSVC runtime DLLlarni bundle ichiga qo'shish.
      # Qt6Core.dll msvcp140.dll va vcruntime140_1.dll ga bog'liq.
      # Target mashinada VC++ 2019+ Redistributable o'rnatilmagan bo'lishi mumkin.
      # Admin huquq talab qilmaslik uchun DLLlarni to'g'ridan-to'g'ri bundlelaymiz.
      # -----------------------------------------------------------------------
      - name: MSVC runtime DLLlarni bundle ichiga ko'chirish
        shell: pwsh
        run: |
          $sys32 = "$env:SystemRoot\System32"
          $dlls = @(
            "msvcp140.dll",
            "msvcp140_1.dll",
            "msvcp140_2.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll",
            "concrt140.dll"
          )

          $bundles = @(
            @{ root = "client\dist\OquvchiPanel";   internal = "client\dist\OquvchiPanel\_internal"   },
            @{ root = "client\dist\OqituvchiPanel"; internal = "client\dist\OqituvchiPanel\_internal" }
          )

          foreach ($b in $bundles) {
            if (-not (Test-Path $b.root)) {
              Write-Error "Bundle topilmadi: $($b.root)"; exit 1
            }
            foreach ($dll in $dlls) {
              $src = Join-Path $sys32 $dll
              if (Test-Path $src) {
                if (Test-Path $b.internal) {
                  Copy-Item $src -Destination $b.internal -Force
                }
                Copy-Item $src -Destination $b.root -Force
                Write-Host "[OK] $dll"
              } else {
                Write-Host "[SKIP] $dll (tizimda yo'q)"
              }
            }
          }

      - name: O'quvchi Setup.exe yasash (Inno Setup)
        shell: pwsh
        run: |
          $src = (Resolve-Path "client\dist\OquvchiPanel").Path
          $out = (Resolve-Path ".").Path
          $iss = @(
            "[Setup]",
            "AppName=Smart Exam Oquvchi",
            "AppVersion=1.0",
            "AppPublisher=Smart Exam System",
            "DefaultDirName={localappdata}\SmartExam\OquvchiPanel",
            "DefaultGroupName=Smart Exam",
            "OutputDir=$out",
            "OutputBaseFilename=OquvchiPanel-Setup",
            "Compression=lzma2",
            "SolidCompression=yes",
            "WizardStyle=modern",
            "DisableProgramGroupPage=yes",
            "PrivilegesRequired=lowest",
            "",
            "[Files]",
            "Source: `"$src\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs",
            "",
            "[Icons]",
            "Name: `"{userdesktop}\Oquvchi Paneli`"; Filename: `"{app}\OquvchiPanel.exe`"",
            "Name: `"{userprograms}\Oquvchi Paneli`"; Filename: `"{app}\OquvchiPanel.exe`"",
            "",
            "[Run]",
            "Filename: `"{app}\OquvchiPanel.exe`"; Description: `"Dasturni ishga tushirish`"; Flags: nowait postinstall skipifsilent"
          )
          $iss | Set-Content "student.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "student.iss"

      - name: O'qituvchi Setup.exe yasash (Inno Setup)
        shell: pwsh
        run: |
          $src = (Resolve-Path "client\dist\OqituvchiPanel").Path
          $out = (Resolve-Path ".").Path
          $iss = @(
            "[Setup]",
            "AppName=Smart Exam Oqituvchi",
            "AppVersion=1.0",
            "AppPublisher=Smart Exam System",
            "DefaultDirName={localappdata}\SmartExam\OqituvchiPanel",
            "DefaultGroupName=Smart Exam",
            "OutputDir=$out",
            "OutputBaseFilename=OqituvchiPanel-Setup",
            "Compression=lzma2",
            "SolidCompression=yes",
            "WizardStyle=modern",
            "DisableProgramGroupPage=yes",
            "PrivilegesRequired=lowest",
            "",
            "[Files]",
            "Source: `"$src\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs",
            "",
            "[Icons]",
            "Name: `"{userdesktop}\Oqituvchi Paneli`"; Filename: `"{app}\OqituvchiPanel.exe`"",
            "Name: `"{userprograms}\Oqituvchi Paneli`"; Filename: `"{app}\OqituvchiPanel.exe`"",
            "",
            "[Run]",
            "Filename: `"{app}\OqituvchiPanel.exe`"; Description: `"Dasturni ishga tushirish`"; Flags: nowait postinstall skipifsilent"
          )
          $iss | Set-Content "teacher.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "teacher.iss"

      - name: O'quvchi Setup.exe yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OquvchiPanel-Setup
          path: OquvchiPanel-Setup.exe
          retention-days: 30

      - name: O'qituvchi Setup.exe yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OqituvchiPanel-Setup
          path: OqituvchiPanel-Setup.exe
          retention-days: 30
