name: Windows .exe yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python 3.11 o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Kutubxonalarni o'rnatish
        working-directory: client
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller==6.3.0
          pip install -r requirements.txt

      - name: O'quvchi panelini yasash
        working-directory: client
        run: pyinstaller --clean --noconfirm student_win.spec

      - name: O'qituvchi panelini yasash
        working-directory: client
        run: pyinstaller --clean --noconfirm teacher_win.spec

      - name: O'quvchi ZIP arxivi
        run: |
          cd client/dist
          Compress-Archive -Path OquvchiPanel -DestinationPath OquvchiPanel-Windows.zip

      - name: O'qituvchi ZIP arxivi
        run: |
          cd client/dist
          Compress-Archive -Path OqituvchiPanel -DestinationPath OqituvchiPanel-Windows.zip

      - name: O'quvchi faylini yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OquvchiPanel-Windows
          path: client/dist/OquvchiPanel-Windows.zip
          retention-days: 30

      - name: O'qituvchi faylini yuklash
        uses: actions/upload-artifact@v4
        with:
          name: OqituvchiPanel-Windows
          path: client/dist/OqituvchiPanel-Windows.zip
          retention-days: 30
