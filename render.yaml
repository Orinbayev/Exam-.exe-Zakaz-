services:
  - type: web
    name: exam-server
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exam-db
          property: connectionString
      - key: SECRET_KEY
        value: exam-uzbekistan-2024-xavfsiz-kalit
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: exam-db
    databaseName: exam_db
    plan: free
    region: frankfurt
